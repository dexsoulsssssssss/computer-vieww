<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultra Screen Stream FIXED</title>

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

  <style>
    * { box-sizing: border-box; margin:0; padding:0; font-family: Arial; }

    body {
      background:#0b0f16;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .app {
      width:100%;
      max-width:900px;
      background:#121826;
      padding:20px;
      border-radius:20px;
    }

    button {
      padding:14px;
      border:none;
      border-radius:12px;
      background:#2563eb;
      color:white;
      cursor:pointer;
      margin-right:10px;
      margin-top:10px;
    }

    input {
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid #333;
      background:#0b0f16;
      color:white;
      margin-top:10px;
    }

    video {
      width:100%;
      margin-top:15px;
      background:black;
      border-radius:12px;
    }

    .card {
      margin-top:15px;
      padding:15px;
      background:#0f1724;
      border-radius:15px;
    }
  </style>
</head>
<body>

<div class="app">
  <h2>Screen Stream (Stable Fix)</h2>

  <button id="hostBtn">Start Hosting</button>
  <button id="viewerBtn">Join Stream</button>

  <div class="card" id="hostPanel" style="display:none;">
    <h3>HOST</h3>
    <div id="hostId"></div>
    <video id="hostVideo" autoplay muted playsinline></video>
  </div>

  <div class="card" id="viewerPanel" style="display:none;">
    <h3>VIEWER</h3>
    <input id="roomInput" placeholder="Enter Host ID" />
    <button id="connectBtn">Connect</button>
    <video id="viewerVideo" autoplay playsinline></video>
  </div>
</div>

<script>
let peer;
let localStream;

const hostBtn = document.getElementById('hostBtn');
const viewerBtn = document.getElementById('viewerBtn');
const hostPanel = document.getElementById('hostPanel');
const viewerPanel = document.getElementById('viewerPanel');
const hostVideo = document.getElementById('hostVideo');
const viewerVideo = document.getElementById('viewerVideo');
const hostIdEl = document.getElementById('hostId');

function createPeer() {
  return new Peer(undefined, {
    config: {
      iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    }
  });
}

// HOST
hostBtn.onclick = async () => {
  hostPanel.style.display = 'block';
  viewerPanel.style.display = 'none';

  try {
    localStream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: 30 },
      audio: false
    });

    hostVideo.srcObject = localStream;

    peer = createPeer();

    peer.on('open', (id) => {
      hostIdEl.innerText = "Host ID: " + id;
    });

    peer.on('call', (call) => {
      call.answer(localStream);
    });

  } catch (e) {
    alert('Screen capture failed');
    console.error(e);
  }
};

// SWITCH VIEWER
viewerBtn.onclick = () => {
  hostPanel.style.display = 'none';
  viewerPanel.style.display = 'block';
};

// CONNECT
connectBtn.onclick = async () => {
  const id = document.getElementById('roomInput').value.trim();

  if (!id) return alert('Enter Host ID');

  peer = createPeer();

  peer.on('open', async () => {

    let fakeStream;
    try {
      fakeStream = await navigator.mediaDevices.getUserMedia({
        video: false,
        audio: false
      });
    } catch (e) {
      fakeStream = new MediaStream();
    }

    const call = peer.call(id, fakeStream);

    call.on('stream', (remoteStream) => {
      console.log('stream received');

      viewerVideo.srcObject = remoteStream;

      viewerVideo.play().catch(()=>{});
    });

  });
};
</script>

</body>
</html>
