<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Screen Stream (Fixed)</title>

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

  <style>
    * { box-sizing: border-box; margin:0; padding:0; font-family: Arial; }

    body {
      background:#0b0f16;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .app {
      width:100%; max-width:800px;
      background:#121826;
      padding:20px;
      border-radius:18px;
    }

    button {
      padding:12px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      cursor:pointer;
      margin:6px 6px 6px 0;
    }

    input {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid #333;
      background:#0b0f16;
      color:white;
    }

    video {
      width:100%;
      margin-top:15px;
      background:black;
      border-radius:12px;
    }

    .card {
      margin-top:15px;
      padding:15px;
      background:#0f1724;
      border-radius:14px;
    }

    .idBox {
      margin-top:10px;
      font-size:1.2rem;
      color:#60a5fa;
      word-break:break-all;
    }
  </style>
</head>
<body>

<div class="app">
  <h2>Screen Stream (Stable + Short IDs)</h2>

  <button id="hostBtn">Start Host</button>
  <button id="viewerBtn">Join</button>

  <div class="card" id="hostPanel" style="display:none;">
    <h3>HOST</h3>
    <div class="idBox" id="hostId">Generating...</div>
    <video id="hostVideo" autoplay muted playsinline></video>
  </div>

  <div class="card" id="viewerPanel" style="display:none;">
    <h3>VIEWER</h3>
    <input id="roomInput" placeholder="Enter ID" />
    <button id="connectBtn">Connect</button>
    <video id="viewerVideo" autoplay playsinline></video>
  </div>
</div>

<script>
let peer;
let stream;

const hostBtn = document.getElementById('hostBtn');
const viewerBtn = document.getElementById('viewerBtn');
const hostPanel = document.getElementById('hostPanel');
const viewerPanel = document.getElementById('viewerPanel');
const hostVideo = document.getElementById('hostVideo');
const viewerVideo = document.getElementById('viewerVideo');
const hostIdBox = document.getElementById('hostId');

function shortId() {
  return Math.random().toString(36).slice(2, 8);
}

function createPeer(id) {
  return new Peer(id, {
    config: {
      iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    }
  });
}

// HOST
hostBtn.onclick = async () => {
  hostPanel.style.display = 'block';
  viewerPanel.style.display = 'none';

  const id = shortId();
  peer = createPeer(id);

  hostIdBox.innerText = "ID: " + id;

  try {
    stream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: 30 },
      audio: false
    });

    hostVideo.srcObject = stream;

    peer.on('call', (call) => {
      call.answer(stream);
    });

  } catch (e) {
    alert('Screen share failed');
    console.error(e);
  }
};

// VIEWER UI
viewerBtn.onclick = () => {
  hostPanel.style.display = 'none';
  viewerPanel.style.display = 'block';
};

// VIEWER CONNECT
connectBtn.onclick = () => {
  const id = document.getElementById('roomInput').value.trim();
  if (!id) return alert('Enter ID');

  peer = createPeer();

  peer.on('open', () => {
    const call = peer.call(id, null);

    call.on('stream', (remoteStream) => {
      viewerVideo.srcObject = remoteStream;

      viewerVideo.onloadedmetadata = () => {
        viewerVideo.play().catch(()=>{});
      };
    });
  });
};
</script>

</body>
</html>
