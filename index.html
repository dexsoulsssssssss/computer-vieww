<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultra Screen Stream</title>

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0b0f16;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 1000px;
      background: #121826;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 0 50px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 2.3rem;
      margin-bottom: 10px;
    }

    p {
      color: #aab4c5;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    button {
      background: #2563eb;
      border: none;
      color: white;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .card {
      background: #0f1724;
      border-radius: 18px;
      padding: 18px;
      margin-top: 16px;
    }

    video {
      width: 100%;
      border-radius: 18px;
      background: black;
      margin-top: 16px;
      max-height: 75vh;
    }

    input {
      width: 100%;
      background: #0b0f16;
      border: 1px solid #273043;
      color: white;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .status {
      margin-top: 12px;
      color: #7dd87d;
      word-break: break-word;
    }

    #qrcode {
      background: white;
      padding: 10px;
      border-radius: 14px;
      width: fit-content;
      margin-top: 14px;
    }

    .stats {
      margin-top: 12px;
      color: #8fa4c5;
      font-size: 0.95rem;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 1.6rem;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>⚡ Ultra Mobile Screen Stream</h1>

    <p>
      High-performance desktop streaming to phones using WebRTC.
      Supports:
      <br>
      • QR auto connect
      <br>
      • Multi viewer support
      <br>
      • Ultra low latency
      <br>
      • Mobile optimized playback
      <br>
      • Audio streaming
      <br>
      • Bitrate optimization
      <br>
      • Near-60fps streaming
    </p>

    <div class="row">
      <button id="hostBtn">Start Hosting</button>
      <button id="viewerBtn">Join Stream</button>
    </div>

    <div class="card" id="hostPanel" style="display:none;">
      <h2>Host</h2>

      <div class="status" id="hostStatus">Idle</div>

      <div id="roomLink"></div>
      <div id="qrcode"></div>

      <div class="stats" id="hostStats"></div>

      <video id="hostVideo" autoplay muted playsinline></video>
    </div>

    <div class="card" id="viewerPanel" style="display:none;">
      <h2>Viewer</h2>

      <input id="roomInput" placeholder="Paste room ID or URL" />

      <button id="connectBtn">Connect</button>

      <div class="status" id="viewerStatus">Idle</div>

      <div class="stats" id="viewerStats"></div>

      <video
        id="viewerVideo"
        autoplay
        playsinline
        muted
        controls
      ></video>
    </div>
  </div>

  <script>
    let peer;
    let localStream;
    let viewers = [];

    const hostBtn = document.getElementById('hostBtn');
    const viewerBtn = document.getElementById('viewerBtn');

    const hostPanel = document.getElementById('hostPanel');
    const viewerPanel = document.getElementById('viewerPanel');

    const hostVideo = document.getElementById('hostVideo');
    const viewerVideo = document.getElementById('viewerVideo');

    const hostStatus = document.getElementById('hostStatus');
    const viewerStatus = document.getElementById('viewerStatus');

    const hostStats = document.getElementById('hostStats');
    const viewerStats = document.getElementById('viewerStats');

    const roomLink = document.getElementById('roomLink');

    function createPeer() {
      return new Peer({
        config: {
          iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:global.stun.twilio.com:3478' }
          ]
        },
        debug: 1
      });
    }

    hostBtn.onclick = async () => {
      hostPanel.style.display = 'block';
      viewerPanel.style.display = 'none';

      hostStatus.textContent = 'Capturing screen...';

      try {
        localStream = await navigator.mediaDevices.getDisplayMedia({
          video: {
            frameRate: {
              ideal: 60,
              max: 60
            },
            width: {
              ideal: 1920
            },
            height: {
              ideal: 1080
            }
          },
          audio: true
        });

        hostVideo.srcObject = localStream;

        const track = localStream.getVideoTracks()[0];
        console.log(track.getSettings());

        peer = createPeer();

        peer.on('open', (id) => {
          hostStatus.textContent = 'Hosting stream';

          const url = `${location.origin}${location.pathname}?room=${id}`;

          roomLink.innerHTML = `
            <p style="margin-top:14px;">
              Share this URL with your phone:
            </p>
            <input value="${url}" readonly>
          `;

          document.getElementById('qrcode').innerHTML = '';

          new QRCode(document.getElementById('qrcode'), {
            text: url,
            width: 200,
            height: 200
          });
        });

        peer.on('call', async (call) => {
          viewers.push(call.peer);

          call.answer(localStream);

          const sender = call.peerConnection
            .getSenders()
            .find(s => s.track && s.track.kind === 'video');

          if (sender) {
            const params = sender.getParameters();

            if (!params.encodings) {
              params.encodings = [{}];
            }

            params.encodings[0].maxBitrate = 12000000;
            params.encodings[0].maxFramerate = 60;

            try {
              await sender.setParameters(params);
            } catch (e) {
              console.log(e);
            }
          }

          hostStatus.textContent = `Connected viewers: ${viewers.length}`;

          call.on('close', () => {
            viewers = viewers.filter(v => v !== call.peer);
            hostStatus.textContent = `Connected viewers: ${viewers.length}`;
          });
        });

        setInterval(() => {
          if (!track) return;

          const settings = track.getSettings();

          hostStats.innerHTML = `
            Resolution: ${settings.width}x${settings.height}
            <br>
            FPS: ${settings.frameRate || 'Unknown'}
            <br>
            Viewers: ${viewers.length}
          `;
        }, 1000);

      } catch (err) {
        console.error(err);
        hostStatus.textContent = 'Failed to start stream';
      }
    };

    viewerBtn.onclick = () => {
      viewerPanel.style.display = 'block';
      hostPanel.style.display = 'none';
    };

    async function connectViewer(roomId) {
      viewerStatus.textContent = 'Connecting...';

      peer = createPeer();

      peer.on('open', async () => {
        const fakeStream = await navigator.mediaDevices
          .getUserMedia({ audio: true, video: false })
          .catch(() => new MediaStream());

        const call = peer.call(roomId, fakeStream);

        call.on('stream', async (remoteStream) => {
          viewerVideo.srcObject = remoteStream;

          try {
            await viewerVideo.play();
          } catch (e) {
            console.log(e);
          }

          viewerStatus.textContent = 'Connected!';

          const track = remoteStream.getVideoTracks()[0];

          setInterval(() => {
            if (!track) return;

            const settings = track.getSettings();

            viewerStats.innerHTML = `
              Resolution: ${settings.width || '?'}x${settings.height || '?'}
              <br>
              FPS: ${settings.frameRate || '?'}
            `;
          }, 1000);
        });

        call.on('close', () => {
          viewerStatus.textContent = 'Disconnected';
        });

        call.on('error', (err) => {
          console.error(err);
          viewerStatus.textContent = 'Connection error';
        });
      });
    }

    document.getElementById('connectBtn').onclick = () => {
      let value = document.getElementById('roomInput').value.trim();

      try {
        if (value.includes('?room=')) {
          value = new URL(value).searchParams.get('room');
        }
      } catch {}

      connectViewer(value);
    };

    const params = new URLSearchParams(location.search);
    const autoRoom = params.get('room');

    if (autoRoom) {
      viewerPanel.style.display = 'block';
      document.getElementById('roomInput').value = autoRoom;
      connectViewer(autoRoom);
    }
  </script>
</body>
</html>
